name: build-pi-images

# Builds Raspberry Pi images by injecting label-hub into the official
# Raspberry Pi OS Lite base image via loopback mount.
# No Docker, no pi-gen, no chroot — fast (~8 min total).
#
# Trigger: workflow_dispatch (manual) or on published versioned releases.

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZBRIDGE_VERSION: "0.16.1"

jobs:
  # ── 1. Cross-compile node binary for each architecture ──────────────────────
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-unknown-linux-gnu
          - arch: armhf
            target: arm-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cross
        run: cargo install cross --locked
      - name: Cross-compile
        run: cross build --release -p label-hub --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/label-hub

  # ── 2. Build image for each architecture ────────────────────────────────────
  images:
    needs: binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, armhf]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: node-${{ matrix.arch }}
          path: ./node-bin

      - name: Download azbridge (arm64 only)
        if: matrix.arch == 'arm64'
        run: |
          curl -fsSL \
            "https://github.com/Azure/azure-relay-bridge/releases/download/v${AZBRIDGE_VERSION}/azbridge.${AZBRIDGE_VERSION}.linux-arm64.deb" \
            -o /tmp/azbridge.deb

      - name: Build image
        run: |
          chmod +x node-bin/label-hub
          AZBRIDGE_ARG=""
          [ -f /tmp/azbridge.deb ] && AZBRIDGE_ARG="/tmp/azbridge.deb"
          sudo bash images/build-image.sh \
            ${{ matrix.arch }} \
            node-bin/label-hub \
            $AZBRIDGE_ARG

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.arch }}
          path: |
            labelhub-${{ matrix.arch }}-*.img.xz
            labelhub-${{ matrix.arch }}-*.img.xz.sha256

  # ── 3. Publish to rolling latest-images release ─────────────────────────────
  publish:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          gh release delete latest-images --yes 2>/dev/null || true
          git tag -f latest-images "$SHA"
          git push origin latest-images --force
          gh release create latest-images dist/*.img.xz dist/*.sha256 \
            --title "Pi images ($(date -u +%Y-%m-%d))" \
            --notes-file images/RELEASE_NOTES.md \
            --prerelease
